# ATMOSphere MPV config — FIND-10 / ATM-312 Layer-3 fix (2026-06-09).
#
# Why this file exists: libmpv is initialized with config-dir = the app's
# filesDir (BaseMPVView.kt:22 + MPVActivity.kt:325). Before this file, MPV
# shipped NO mpv.conf, so libmpv config-probed
#   /data/user/0/is.xyz.mpv/files/mpv.conf
# found nothing, and logged
#   "[file:error] Cannot open file '.../mpv.conf': Permission denied"
# (FIND-10 / recording_002:95415). Shipping the file:
#   (a) removes that noisy log line (the file now exists + is app-owned), and
#   (b) config-pins the RK3588-correct decode/VO intent as a belt-and-suspenders
#       floor under the runtime MPVView.initOptions() setOptionString() path
#       (initOptions runs AFTER config is read, so any conflicting runtime
#       value wins — this config is the floor, never an override).
#
# Keep this minimal and STATIC. Do NOT put dynamic / per-display options here
# (display-fps-override, config-dir, screenshot-directory) — those are computed
# at runtime in MPVView.initOptions() and would be stale if pinned here.

# --- HW decode (FIND-10 / ATM-312) -----------------------------------------
# Prefer zero-copy rkmpp (FFmpeg hevc_rkmpp/h264_rkmpp/vp9_rkmpp -> DRM_PRIME
# dmabuf -> gpu-next dmabuf-EGL interop import on Mali-G610). rkmpp-copy is the
# CPU copy-back fallback; v4l2m2m-copy + mediacodec keep playback alive for any
# codec rkmpp cannot handle. Mirrors MPVView.HWDECS.
hwdec=rkmpp,rkmpp-copy,v4l2m2m-copy,mediacodec
hwdec-codecs=h264,hevc,mpeg4,mpeg2video,vp8,vp9,av1

# --- VO (libplacebo gpu-next, the dmabuf-EGL interop target) ----------------
vo=gpu-next
gpu-context=android
opengl-es=yes
profile=fast
